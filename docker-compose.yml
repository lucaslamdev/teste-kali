services:
  kali-worker:
    image: ${IMAGE_NAME:-kalilinux/kali-rolling:latest}
    container_name: ${CONTAINER_NAME:-kali-cursor-worker}
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      WORKER_NAME: ${WORKER_NAME:-kali-docker-worker}
      CURSOR_WORKER_DIR: ${CURSOR_WORKER_DIR:-/workspace}
      KALI_METAPACKAGE: ${KALI_METAPACKAGE:-}
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
      CURSOR_AUTH_TOKEN: ${CURSOR_AUTH_TOKEN:-}
    volumes:
      - ${WORKER_DIR:-.}:/workspace
      - ./scripts/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - cursor-auth-home:/root/.cursor
      - cursor-auth-config:/root/.config/cursor
    # Saída HTTPS para api2.cursor.sh e artefatos S3 (My Machines)
    # Documentação: https://cursor.com/docs/cloud-agent/my-machines

volumes:
  cursor-auth-home:
    name: ${CONTAINER_NAME:-kali-cursor-worker}-cursor-auth-home
  cursor-auth-config:
    name: ${CONTAINER_NAME:-kali-cursor-worker}-cursor-auth-config
